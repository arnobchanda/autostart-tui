# Hyprland windowrules for autostart-tui.
# Copy to ~/.config/hypr/windows.conf (or any sourced file) and reload
# with `hyprctl reload`. Then launch the .desktop entry — the terminal
# opens as a centered floating window instead of a tiled one.
#
# The Exec= line in autostart-tui.desktop sets ghostty --class=autostart-tui
# so these rules target our terminal specifically, not every ghostty window.

windowrule = float on,     match:class ^autostart-tui$
windowrule = size 60% 70%, match:class ^autostart-tui$
windowrule = center on,    match:class ^autostart-tui$
