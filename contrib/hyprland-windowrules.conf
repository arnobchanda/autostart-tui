# Hyprland windowrules for autostart-tui.
# Copy to ~/.config/hypr/windows.conf (or any sourced file) and reload
# with `hyprctl reload`. Then launch the .desktop entry — the terminal
# opens as a centered floating window instead of a tiled one.
#
# The Exec= line in autostart-tui.desktop runs `omarchy-launch-or-focus-tui
# autostart-tui`, which uses xdg-terminal-exec to set the window app-id to
# org.omarchy.autostart-tui — these rules target that app-id so they apply
# to this tool's terminal window only, not every terminal you open.

windowrule = float on,     match:class ^org\.omarchy\.autostart-tui$
windowrule = size 80% 75%, match:class ^org\.omarchy\.autostart-tui$
windowrule = center on,    match:class ^org\.omarchy\.autostart-tui$
